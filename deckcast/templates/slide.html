<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{ --accent:%%ACCENT%%; --accent2:%%ACCENT2%%; --bg:%%BG%%; --ink:%%INK%%; }
  *{margin:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden}
  body{
    font-family:Inter,-apple-system,sans-serif;color:var(--ink);background:var(--bg);
    background-image:%%OVERLAY%%%%IMG%%;
    background-size:cover;background-position:center;
    display:flex;flex-direction:column;justify-content:center;padding:130px 150px;position:relative;
  }
  .brand{position:absolute;top:64px;left:150px;display:flex;align-items:center;gap:18px;
    font-family:Fraunces,serif;font-weight:600;font-size:30px;letter-spacing:-.01em}
  .brand .b{width:64px;height:64px;border-radius:17px;display:grid;place-items:center;color:#fff;
    font-weight:700;font-size:36px;background:linear-gradient(150deg,var(--accent),#0c463d)}
  .eyebrow{font-size:18px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin-bottom:22px;display:flex;align-items:center;gap:16px}
  .eyebrow::before{content:"";width:46px;height:3px;border-radius:3px;background:var(--accent2)}
  h1{font-family:Fraunces,serif;font-weight:600;font-size:%%TITLESIZE%%;line-height:1.03;
    letter-spacing:-.02em;max-width:20ch}
  .sub{margin-top:26px;font-size:34px;line-height:1.45;color:#5d6b67;max-width:46ch}
  ul{margin-top:34px;list-style:none;display:flex;flex-direction:column;gap:16px;max-width:42ch}
  li{font-size:30px;line-height:1.4;padding-left:40px;position:relative;color:#3a4a45}
  li::before{content:"";position:absolute;left:0;top:14px;width:18px;height:18px;border-radius:5px;
    background:var(--accent2)}
  .foot{position:absolute;bottom:60px;left:150px;right:150px;display:flex;justify-content:space-between;
    align-items:center;font-size:22px;color:#5d6b67;font-weight:600}
</style></head>
<body class="%%DARKCLASS%%">
  <div class="brand"><span class="b">%%INITIAL%%</span>%%BRAND%%</div>
  <div class="eyebrow">%%EYEBROW%%</div>
  <h1>%%TITLE%%</h1>
  %%SUBTITLE%%
  %%BULLETS%%
  <div class="foot"><span>%%BRAND%%</span><span>%%IDX%% / %%TOTAL%%</span></div>
</body></html>
