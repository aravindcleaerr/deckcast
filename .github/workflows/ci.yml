name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # GitHub's ubuntu runners ship Google Chrome; we just need ffmpeg.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deckcast (with export extras) + pytest
        run: pip install -e ".[export]" pytest

      - name: Compile-check all modules
        run: python -m compileall -q deckcast

      - name: Unit tests
        run: pytest -q

      - name: Prerequisites (deckcast doctor)
        run: deckcast doctor

      # Renders a real slide frame via headless Chrome. No tokens / external APIs needed
      # (image.provider=none, frames only) so CI stays deterministic and green.
      - name: Smoke build — render a frame
        run: |
          deckcast run .github/smoke.yaml --steps frames --only 1
          test -f .github/build_deckcast/frames/frame-01.png \
            && echo "✓ frame rendered" || (echo "✗ no frame produced" && exit 1)

      # Build the document decks (no ffmpeg/tokens needed) from the same frames.
      - name: Smoke export — pptx / pdf / html
        run: |
          deckcast run .github/smoke.yaml --steps frames --formats pptx,pdf,html
          for ext in pptx pdf html; do
            test -f .github/out/smoke.$ext \
              && echo "✓ smoke.$ext" || (echo "✗ missing smoke.$ext" && exit 1)
          done
